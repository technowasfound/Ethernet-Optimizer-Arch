[general]
log_file = /var/log/ethoptimizer/ethoptimizer.log
backup_dir = /var/lib/ethoptimizer/backups

[speedtest]
ping_hosts = 1.1.1.1, 8.8.8.8
download_urls = https://speed.cloudflare.com/__down?bytes=10485760
upload_endpoint = https://httpbin.org/post

[profile_gaming]
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_timestamps = 0
net.ipv4.tcp_sack = 1
net.ipv4.tcp_low_latency = 1
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.default_qdisc = fq
